name: Daily Digest

on:
  schedule:
    # 7:00 AM EST = 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write   # needed to push the generated HTML back to repo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # safety cap — well within free tier

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # shallow clone, faster

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python digest.py

      - name: Commit & push digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "digest: $(date -u '+%Y-%m-%d')"
          git push
